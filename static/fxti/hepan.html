<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合盤分析 - 雙人八字深度對比 | 風水樓 FXTI</title>
    <link rel="stylesheet" href="/static/css/fxti-social-theme.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0A0A0F 0%, #1A1A2E 50%, #0F0F1A 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        /* 頂部導航 */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,169,98,0.1);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: 700; color: #C9A962; text-decoration: none; }
        .nav-links { display: flex; gap: 16px; }
        .nav-links a { color: #bcbcbc; text-decoration: none; font-size: 13px; transition: color 0.2s; }
        .nav-links a:hover { color: #C9A962; }
        
        .container {
            max-width: 900px; margin: 0 auto;
            padding: 80px 20px 40px;
        }
        
        /* 頁面標題 */
        .page-header {
            text-align: center; margin-bottom: 32px;
        }
        .page-header h1 {
            font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #C9A962, #E8D5A3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .page-header p { color: #808080; font-size: 14px; }
        
        /* 雙人輸入卡片 */
        .dual-input {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
            margin-bottom: 24px;
        }
        @media (max-width: 700px) { .dual-input { grid-template-columns: 1fr; } }
        
        .person-card {
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid rgba(201,169,98,0.15);
            border-radius: 16px; padding: 24px;
        }
        .person-card.male { border-top: 3px solid #4A90D9; }
        .person-card.female { border-top: 3px solid #E85D75; }
        .person-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 16px;
        }
        .person-icon {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .person-card.male .person-icon { background: rgba(74, 144, 217, 0.2); }
        .person-card.female .person-icon { background: rgba(232, 93, 117, 0.2); }
        .person-name { font-size: 16px; font-weight: 600; }
        
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block; font-size: 12px; color: #808080;
            margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-group input, .form-group select {
            width: 100%; padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; color: #fff; font-size: 14px;
            transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none; border-color: #C9A962;
            background: rgba(201,169,98,0.05);
        }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* 中央連接符 */
        .connection-divider {
            display: flex; align-items: center; justify-content: center;
            position: relative;
        }
        .connection-divider::before {
            content: ''; position: absolute;
            width: 1px; height: 100%; background: rgba(201,169,98,0.2);
        }
        .connection-icon {
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #C9A962, #A08438);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; z-index: 1;
            box-shadow: 0 4px 20px rgba(201,169,98,0.3);
        }
        
        /* 分析按鈕 */
        .analyze-btn {
            width: 100%; padding: 16px;
            background: linear-gradient(135deg, #C9A962, #A08438);
            border: none; border-radius: 12px;
            color: #0A0A0F; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            margin-bottom: 24px;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,169,98,0.4);
        }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* 結果區域 */
        .results-section { display: none; }
        .results-section.active { display: block; }
        
        /* 總分卡片 */
        .score-overview {
            background: linear-gradient(135deg, rgba(201,169,98,0.15), rgba(139,115,85,0.05));
            border: 1px solid rgba(201,169,98,0.2);
            border-radius: 16px; padding: 28px;
            text-align: center; margin-bottom: 24px;
        }
        .score-ring {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid rgba(201,169,98,0.2);
            border-top-color: #C9A962;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px;
            position: relative;
        }
        .score-value {
            font-size: 36px; font-weight: 700; color: #C9A962;
        }
        .score-label { font-size: 12px; color: #808080; margin-top: 4px; }
        .score-rating {
            font-size: 18px; font-weight: 600; color: #fff;
            margin-bottom: 8px;
        }
        .score-desc { font-size: 13px; color: #bcbcbc; line-height: 1.6; }
        
        /* 標籤頁 */
        .tabs {
            display: flex; gap: 8px; margin-bottom: 20px;
            overflow-x: auto; padding-bottom: 4px;
        }
        .tab {
            padding: 10px 20px; border-radius: 10px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #bcbcbc; font-size: 13px; font-weight: 500;
            cursor: pointer; white-space: nowrap; transition: all 0.2s;
        }
        .tab.active {
            background: rgba(201,169,98,0.15);
            border-color: rgba(201,169,98,0.3);
            color: #C9A962;
        }
        .tab:hover:not(.active) { border-color: rgba(201,169,98,0.2); }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* 時間軸 */
        .timeline {
            position: relative; padding-left: 30px;
        }
        .timeline::before {
            content: ''; position: absolute; left: 8px; top: 0; bottom: 0;
            width: 2px; background: rgba(201,169,98,0.2);
        }
        .timeline-item {
            position: relative; margin-bottom: 16px;
            background: rgba(30, 30, 40, 0.6);
            border-radius: 12px; padding: 16px;
        }
        .timeline-item::before {
            content: ''; position: absolute; left: -26px; top: 20px;
            width: 12px; height: 12px; border-radius: 50%;
            background: #C9A962; border: 2px solid #0A0A0F;
        }
        .timeline-item.harmony::before { background: #4CAF50; }
        .timeline-item.test::before { background: #FFC107; }
        .timeline-item.conflict::before { background: #FF9800; }
        .timeline-item.crisis::before { background: #F44336; }
        
        .timeline-year {
            font-size: 18px; font-weight: 700; color: #C9A962;
            margin-bottom: 4px;
        }
        .timeline-status {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 11px; font-weight: 600; margin-bottom: 8px;
        }
        .timeline-status.harmony { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .timeline-status.test { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .timeline-status.conflict { background: rgba(255, 152, 0, 0.2); color: #FF9800; }
        .timeline-status.crisis { background: rgba(244, 67, 54, 0.2); color: #F44336; }
        .timeline-score { float: right; font-size: 14px; color: #808080; }
        .timeline-note { font-size: 13px; color: #bcbcbc; line-height: 1.5; }
        .timeline-elements {
            display: flex; gap: 8px; margin-top: 8px;
            font-size: 12px; color: #808080;
        }
        .element-tag {
            padding: 2px 8px; border-radius: 4px;
            background: rgba(255,255,255,0.05);
        }
        
        /* 八字對比表 */
        .bazi-comparison {
            background: rgba(30, 30, 40, 0.6);
            border-radius: 16px; padding: 20px;
            margin-bottom: 16px;
        }
        .bazi-table {
            width: 100%; border-collapse: collapse;
        }
        .bazi-table th, .bazi-table td {
            padding: 12px; text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .bazi-table th {
            color: #808080; font-size: 12px; font-weight: 500;
            text-transform: uppercase;
        }
        .bazi-table td {
            font-size: 18px; font-weight: 600;
        }
        .bazi-table .gan { color: #C9A962; }
        .bazi-table .zhi { color: #bcbcbc; }
        .bazi-table .wuxing-tag {
            font-size: 11px; padding: 2px 8px; border-radius: 4px;
            display: inline-block; margin-top: 4px;
        }
        .wuxing-wood { background: rgba(76, 175, 80, 0.2); color: #4CAF50; }
        .wuxing-fire { background: rgba(255, 87, 34, 0.2); color: #FF5722; }
        .wuxing-earth { background: rgba(255, 193, 7, 0.2); color: #FFC107; }
        .wuxing-metal { background: rgba(255, 255, 255, 0.1); color: #E0E0E0; }
        .wuxing-water { background: rgba(33, 150, 243, 0.2); color: #2196F3; }
        
        /* 五行關係圖 */
        .wuxing-relation {
            display: flex; align-items: center; justify-content: center;
            gap: 20px; padding: 24px;
            background: rgba(30, 30, 40, 0.6);
            border-radius: 16px; margin-bottom: 16px;
        }
        .wuxing-person {
            text-align: center;
        }
        .wuxing-avatar {
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; margin: 0 auto 8px;
            border: 2px solid;
        }
        .wuxing-name { font-size: 14px; font-weight: 600; }
        .wuxing-element { font-size: 12px; color: #808080; }
        .relation-arrow {
            text-align: center;
        }
        .relation-type {
            font-size: 16px; font-weight: 700; color: #C9A962;
            padding: 8px 16px; border-radius: 20px;
            background: rgba(201,169,98,0.1);
            border: 1px solid rgba(201,169,98,0.2);
        }
        .relation-desc { font-size: 12px; color: #808080; margin-top: 6px; }
        
        /* 建議卡片 */
        .advice-card {
            background: rgba(30, 30, 40, 0.6);
            border-radius: 12px; padding: 16px;
            margin-bottom: 12px; border-left: 3px solid #C9A962;
        }
        .advice-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 6px; }
        .advice-text { font-size: 13px; color: #bcbcbc; line-height: 1.6; }
        
        /* 測測APP風格合盤評分卡 */
        .hepan-score-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        @media (max-width: 600px) { .hepan-score-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .hepan-score-item {
            background: rgba(30, 30, 40, 0.6);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }
        .hepan-score-item:hover {
            border-color: rgba(201,169,98,0.2);
            transform: translateY(-2px);
        }
        .hepan-score-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .hepan-score-label {
            font-size: 12px;
            color: #808080;
            margin-bottom: 4px;
        }
        .hepan-score-value {
            font-size: 24px;
            font-weight: 700;
            color: #C9A962;
        }
        .hepan-score-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }
        .hepan-score-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #C9A962, #E8D5A3);
            transition: width 1s ease;
        }
        
        /* 十神分析卡片 */
        .shishen-card {
            background: rgba(30, 30, 40, 0.6);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .shishen-title {
            font-size: 16px;
            font-weight: 600;
            color: #C9A962;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .shishen-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        @media (max-width: 600px) { .shishen-grid { grid-template-columns: repeat(2, 1fr); } }
        
        .shishen-item {
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }
        .shishen-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .shishen-desc {
            font-size: 11px;
            color: #808080;
        }
        
        /* 藏干展示 */
        .canggan-row {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .canggan-tag {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            background: rgba(201,169,98,0.1);
            color: #C9A962;
            border: 1px solid rgba(201,169,98,0.15);
        }
        
        /* 大運對比表格 */
        .dayun-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }
        .dayun-table th, .dayun-table td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 13px;
        }
        .dayun-table th {
            color: #808080;
            font-weight: 500;
        }
        .dayun-table .current {
            background: rgba(201,169,98,0.1);
            border-radius: 8px;
        }
        
        /* 緣分指數環形圖 */
        .fortune-ring {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(#C9A962 var(--percent), rgba(255,255,255,0.05) 0);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 8px;
            position: relative;
        }
        .fortune-ring::before {
            content: '';
            position: absolute;
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: #1A1A2E;
        }
        .fortune-ring-text {
            position: relative;
            z-index: 1;
            font-size: 18px;
            font-weight: 700;
            color: #C9A962;
        }
        .loading-overlay {
            display: none; text-align: center; padding: 60px;
        }
        .loading-overlay.active { display: block; }
        .spinner {
            width: 48px; height: 48px;
            border: 3px solid rgba(201,169,98,0.2);
            border-top-color: #C9A962;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 每日運勢卡片 */
        .daily-fortune-card {
            background: linear-gradient(135deg, rgba(201,169,98,0.1), rgba(139,115,85,0.05));
            border: 1px solid rgba(201,169,98,0.15);
            border-radius: 16px; padding: 24px;
            margin-bottom: 16px;
        }
        .fortune-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 16px;
        }
        .fortune-date { font-size: 14px; color: #808080; }
        .fortune-score {
            font-size: 32px; font-weight: 700; color: #C9A962;
        }
        .fortune-tags {
            display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
        }
        .fortune-tag {
            padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 500;
        }
        .fortune-tag.good { background: rgba(76, 175, 80, 0.15); color: #4CAF50; }
        .fortune-tag.bad { background: rgba(244, 67, 54, 0.15); color: #F44336; }
        .fortune-tag.neutral { background: rgba(255, 193, 7, 0.15); color: #FFC107; }
        
        /* 底部導航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(201,169,98,0.1);
            display: flex; justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        .bottom-nav a {
            text-decoration: none; color: #808080;
            font-size: 11px; text-align: center;
            padding: 4px 12px; transition: color 0.2s;
        }
        .bottom-nav a.active { color: #C9A962; }
        .bottom-nav a .icon { font-size: 20px; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>
    <!-- 頂部導航 -->
    <nav class="top-nav">
        <a href="/fxti" class="logo">風水樓</a>
        <div class="nav-links">
            <a href="/fxti">五行測評</a>
            <a href="/fxti/compatibility.html">關係指南</a>
            <a href="/fxti/social.html">緣分社區</a>
        </div>
    </nav>

    <div class="container">
        <!-- 頁面標題 -->
        <div class="page-header">
            <h1>合盤分析</h1>
            <p>雙人八字深度對比 · 大運流年交叉分析 · 緣分時間軸</p>
        </div>

        <!-- 雙人輸入表單 -->
        <div class="dual-input">
            <div class="person-card male">
                <div class="person-header">
                    <div class="person-icon">♂</div>
                    <div class="person-name">甲方（主盤）</div>
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <input type="date" id="a-birth-date" value="1990-05-15">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生時辰</label>
                        <select id="a-birth-hour">
                            <option value="0">子時 (23-1)</option>
                            <option value="2">丑時 (1-3)</option>
                            <option value="4">寅時 (3-5)</option>
                            <option value="6">卯時 (5-7)</option>
                            <option value="8">辰時 (7-9)</option>
                            <option value="10">巳時 (9-11)</option>
                            <option value="12">午時 (11-13)</option>
                            <option value="14">未時 (13-15)</option>
                            <option value="16">申時 (15-17)</option>
                            <option value="18">酉時 (17-19)</option>
                            <option value="20">戌時 (19-21)</option>
                            <option value="22">亥時 (21-23)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>性別</label>
                        <select id="a-gender">
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="person-card female">
                <div class="person-header">
                    <div class="person-icon">♀</div>
                    <div class="person-name">乙方（副盤）</div>
                </div>
                <div class="form-group">
                    <label>出生日期</label>
                    <input type="date" id="b-birth-date" value="1992-08-20">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>出生時辰</label>
                        <select id="b-birth-hour">
                            <option value="0">子時 (23-1)</option>
                            <option value="2">丑時 (1-3)</option>
                            <option value="4">寅時 (3-5)</option>
                            <option value="6">卯時 (5-7)</option>
                            <option value="8">辰時 (7-9)</option>
                            <option value="10">巳時 (9-11)</option>
                            <option value="12">午時 (11-13)</option>
                            <option value="14">未時 (13-15)</option>
                            <option value="16">申時 (15-17)</option>
                            <option value="18">酉時 (17-19)</option>
                            <option value="20">戌時 (19-21)</option>
                            <option value="22">亥時 (21-23)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>性別</label>
                        <select id="b-gender">
                            <option value="female">女</option>
                            <option value="male">男</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <button class="analyze-btn" onclick="runHePan()" id="analyze-btn">
            開始合盤分析
        </button>

        <!-- 加載動畫 -->
        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <p style="color: #808080; font-size: 14px;">正在計算雙人八字合盤...</p>
            <p style="color: #666; font-size: 12px; margin-top: 8px;">分析大運流年交叉 · 五行生剋互動</p>
        </div>

        <!-- 結果區域 -->
        <div class="results-section" id="results">
            <!-- 總分概覽 -->
            <div class="score-overview">
                <div class="score-ring">
                    <div>
                        <div class="score-value" id="total-score">--</div>
                        <div class="score-label">匹配分數</div>
                    </div>
                </div>

    <script>
        // 標籤切換
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
        }

        // 解析日期
        function parseDate(dateStr) {
            const d = new Date(dateStr);
            return {
                year: d.getFullYear(),
                month: d.getMonth() + 1,
                day: d.getDate()
            };
        }

        // 運行合盤分析
        async function runHePan() {
            const btn = document.getElementById('analyze-btn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            
            btn.disabled = true;
            loading.classList.add('active');
            results.classList.remove('active');

            const aDate = parseDate(document.getElementById('a-birth-date').value);
            const bDate = parseDate(document.getElementById('b-birth-date').value);
            const aGender = document.getElementById('a-gender').value;
            const bGender = document.getElementById('b-gender').value;

            try {
                // 1. 調用歲月磨合引擎
                const timingRes = await fetch('/api/fxti/timing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        person_a_birth_year: aDate.year,
                        person_a_birth_month: aDate.month,
                        person_a_birth_day: aDate.day,
                        person_a_gender: aGender,
                        person_b_birth_year: bDate.year,
                        person_b_birth_month: bDate.month,
                        person_b_birth_day: bDate.day,
                        person_b_gender: bGender,
                        analysis_years: 10,
                        current_year: 2026
                    })
                });
                const timingData = await timingRes.json();

                // 2. 調用 FXTI 關係分析
                const fxtiRes = await fetch('/api/fxti/relationship', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        person_a: {
                            birth_year: aDate.year,
                            birth_month: aDate.month,
                            birth_day: aDate.day,
                            gender: aGender,
                            answers: [2, 2, 2, 2, 2, 2, 2, 2, 2, 2]
                        },
                        person_b: {
                            birth_year: bDate.year,
                            birth_month: bDate.month,
                            birth_day: bDate.day,
                            gender: bGender,
                            answers: [2, 2, 2, 2, 2, 2, 2, 2, 2, 2]
                        }
                    })
                });
                const fxtiData = await fxtiRes.json();

                // 3. 獲取每日運勢
                const dailyRes = await fetch('/api/fxti/daily-fortune', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        birth_year: aDate.year,
                        birth_month: aDate.month,
                        birth_day: aDate.day
                    })
                });
                const dailyData = await dailyRes.json();

                // 渲染結果
                renderResults(timingData.data, fxtiData.data, dailyData.data);

            } catch (error) {
                console.error('合盤分析失敗:', error);
                alert('分析過程中出現錯誤，請稍後重試');
            } finally {
                btn.disabled = false;
                loading.classList.remove('active');
                results.classList.add('active');
            }
        }

        // 渲染結果（測測APP風格增強版）
        function renderResults(timing, fxti, daily) {
            // 總分
            const score = timing.overall_timing_score || 70;
            document.getElementById('total-score').textContent = score;
            
            const ratings = {
                excellent: { text: '天作之合', desc: '雙方命理高度契合，未來十年大部分時間都處於和諧狀態，是難得的緣分。' },
                good: { text: '非常契合', desc: '整體運勢良好，雖有起伏但好年居多，適合長期發展。' },
                average: { text: '相得益彰', desc: '有和諧也有考驗，需要雙方共同努力經營關係。' },
                challenging: { text: '需要磨合', desc: '挑戰較多，但通過理解和包容可以建立穩定關係。' }
            };
            
            let rating = ratings.challenging;
            if (score >= 80) rating = ratings.excellent;
            else if (score >= 65) rating = ratings.good;
            else if (score >= 50) rating = ratings.average;
            
            document.getElementById('score-rating').textContent = rating.text;
            document.getElementById('score-desc').textContent = rating.desc;

            // 測測APP風格六維度評分卡
            renderHePanScoreGrid(fxti, timing);

            // 時間軸
            renderTimeline(timing);

            // 八字對比表（增強版）
            renderBaziComparison(fxti);

            // 十神分析
            renderShiShenAnalysis(fxti);

            // 大運同步對比
            renderDayunComparison(timing);

            // 五行關係
            renderWuxingRelation(fxti);

            // 相處建議
            renderAdvice(fxti, timing);

            // 每日運勢
            renderDailyFortune(daily);
        }

                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                            <div style="background: rgba(76,175,80,0.1); border-radius: 8px; padding: 12px;">
                                <div style="font-size: 12px; color: #4CAF50; margin-bottom: 4px;">✓ 宜</div>
                                <div style="font-size: 13px; color: #bcbcbc;">${(daily.suitable || ['社交', '學習']).join('、')}</div>
                            </div>
                            <div style="background: rgba(244,67,54,0.1); border-radius: 8px; padding: 12px;">
                                <div style="font-size: 12px; color: #F44336; margin-bottom: 4px;">✗ 忌</div>
                                <div style="font-size: 13px; color: #bcbcbc;">${(daily.unsuitable || ['爭執', '冒險']).join('、')}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // 輔助函數
        function getElementColor(element) {
            const colors = {
                '木': '#4CAF50', '火': '#FF5722', '土': '#FFC107',
                '金': '#E0E0E0', '水': '#2196F3'
            };
            return colors[element] || '#C9A962';
        }
        function getElementEmoji(element) {
            const emojis = { '木': '🌲', '火': '🔥', '土': '⛰️', '金': '⚔️', '水': '💧' };
            return emojis[element] || '✨';
        }
        function getRelationDesc(relation) {
            const descs = {
                '相生': '互相滋養，關係和諧',
                '相剋': '需要磨合，互相包容',
                '比和': '志同道合，平穩發展'
            };
            return descs[relation] || '關係平穩';
        }
    </script>
</body>
</html>
