<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FXTI 緣分配對 - 五行社交匹配</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Tinder-inspired Pink + Mint Green palette */
            --pink: #FF5864;
            --pink-light: #FF7B82;
            --pink-dark: #E84855;
            --mint: #00D9C0;
            --mint-light: #4FF0D8;
            --mint-dark: #00B8A3;
            --dark: #1A1A2E;
            --dark-card: #252540;
            --dark-lighter: #32325A;
            --text: #FFFFFF;
            --text-muted: #A0A0B8;
            --text-dim: #6B6B8A;
            --gradient-pink: linear-gradient(135deg, #FF5864, #FF8A98);
            --gradient-mint: linear-gradient(135deg, #00D9C0, #4FF0D8);
            --gradient-romantic: linear-gradient(135deg, #FF5864, #FF8A98, #FFB6C1);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 20px rgba(255,88,100,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ===== Netflix-style Logo Animation ===== */
        .logo-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--gradient-pink);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            animation: logoPulse 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255,88,100,0.4);
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,88,100,0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,88,100,0.6); }
        }
        
        .logo-text {
            font-size: 22px; font-weight: 800;
            background: var(--gradient-romantic);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,88,100,0.1);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
        }
        
        .nav-actions {
            display: flex; gap: 12px; align-items: center;
        }
        
        .nav-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            transition: all 0.2s;
        }
        
        .nav-btn:hover { background: rgba(255,88,100,0.15); border-color: var(--pink); }
        .nav-btn.active { background: rgba(255,88,100,0.2); border-color: var(--pink); color: var(--pink); }
        
        .coin-badge {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 16px;
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.3);
            font-size: 13px; font-weight: 600; color: #FFC107;
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: 60px; padding-bottom: 80px;
            max-width: 430px; margin: 0 auto;
        }
        
        /* ===== Tinder-style Card Stack ===== */
        .card-stack {
            position: relative;
            width: 100%; height: 540px;
            margin: 16px auto;
            perspective: 1000px;
        }
        
        .match-card {
            position: absolute; top: 0; left: 16px; right: 16px;
            height: 100%;
            background: var(--dark-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
            border: 1px solid rgba(255,88,100,0.08);
            will-change: transform;
        }
        
        .match-card:nth-child(2) { transform: scale(0.96) translateY(12px); opacity: 0.5; z-index: -1; }
        .match-card:nth-child(3) { transform: scale(0.92) translateY(24px); opacity: 0.25; z-index: -2; }
        
        .card-image {
            width: 100%; height: 68%;
            background-size: cover; background-position: center;
            position: relative;
        }
        
        .card-image::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 120px;
            background: linear-gradient(transparent, var(--dark-card));
        }
        
        /* 五行元素遮罩（专利规避：互动解锁） */
        .wuxing-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(26,26,46,0.85);
            backdrop-filter: blur(8px);
            transition: opacity 0.6s ease, backdrop-filter 0.6s ease;
        }
        
        .wuxing-overlay.revealed { opacity: 0; pointer-events: none; backdrop-filter: blur(0); }
        
        .wuxing-card {
            width: 180px; height: 240px;
            background: linear-gradient(135deg, rgba(255,88,100,0.15), rgba(0,217,192,0.08));
            border: 2px solid var(--pink);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(255,88,100,0.2);
            animation: wuxingFloat 3s ease-in-out infinite;
        }
        
        @keyframes wuxingFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .wuxing-symbol {
            font-size: 56px; margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(255,88,100,0.5));
        }
        
        .wuxing-name {
            font-size: 22px; font-weight: 700; color: var(--pink);
            margin-bottom: 6px;
        }
        
        .wuxing-desc {
            font-size: 13px; color: var(--text-muted);
        }
        
        .wuxing-hint {
            margin-top: 16px; font-size: 12px;
            color: var(--mint); font-weight: 500;
        }
        
        .card-info {
            padding: 16px 20px 20px;
            position: relative;
            z-index: 2;
        }
        
        .card-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        }
        
        .card-name {
            font-size: 24px; font-weight: 700;
        }
        
        .card-age {
            font-size: 18px; color: var(--text-muted); font-weight: 500;
        }
        
        .card-badge {
            padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        
        .badge-verified {
            background: rgba(0,217,192,0.15); color: var(--mint);
        }
        
        .badge-premium {
            background: linear-gradient(135deg, rgba(255,88,100,0.2), rgba(255,138,152,0.1));
            color: var(--pink); border: 1px solid rgba(255,88,100,0.3);
        }
        
        .card-meta {
            display: flex; gap: 12px; margin-bottom: 10px;
            font-size: 13px; color: var(--text-muted);
        }
        
        .card-bio {
            font-size: 14px; color: var(--text-muted); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 六维度雷达图预览 */
        .radar-preview {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,88,100,0.08);
        }
        
        .radar-preview-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        
        .radar-preview-title {
            font-size: 12px; color: var(--text-muted);
        }
        
        .radar-preview-score {
            font-size: 16px; font-weight: 700; color: var(--pink);
        }
        
        .radar-mini-canvas {
            width: 100%; height: 80px;
        }
        
        /* 滑动按钮 */
        .swipe-actions {
            display: flex; justify-content: center; gap: 24px;
            padding: 16px;
        }
        
        .swipe-btn {
            width: 64px; height: 64px; border-radius: 50%;
            border: 2px solid; background: transparent;
            font-size: 28px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .swipe-btn:hover { transform: scale(1.15); }
        .swipe-btn:active { transform: scale(0.95); }
        
        .swipe-btn.pass { 
            border-color: #FF6B6B; color: #FF6B6B;
            background: rgba(255,107,107,0.05);
        }
        .swipe-btn.pass:hover { background: rgba(255,107,107,0.15); box-shadow: 0 0 20px rgba(255,107,107,0.3); }
        
        .swipe-btn.like { 
            border-color: var(--pink); color: var(--pink);
            background: rgba(255,88,100,0.05);
            width: 72px; height: 72px; font-size: 32px;
        }
        .swipe-btn.like:hover { 
            background: rgba(255,88,100,0.15); 
            box-shadow: 0 0 25px rgba(255,88,100,0.4);
        }
        
        .swipe-btn.super { 
            border-color: var(--mint); color: var(--mint);
            background: rgba(0,217,192,0.05);
        }
        .swipe-btn.super:hover { 
            background: rgba(0,217,192,0.15); 
            box-shadow: 0 0 20px rgba(0,217,192,0.3);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,88,100,0.08);
            display: flex; justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        
        .bottom-nav-item {
            text-decoration: none; color: var(--text-dim);
            font-size: 11px; text-align: center;
            padding: 4px 16px; transition: all 0.2s;
            border: none; background: none; cursor: pointer;
            position: relative;
        }
        
        .bottom-nav-item.active { color: var(--pink); }
        .bottom-nav-item.active::after {
            content: '';
            position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 3px; border-radius: 2px;
            background: var(--gradient-pink);
        }
        
        .bottom-nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
        
        /* 匹配成功动画 */
        .match-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(26,26,46,0.97);
            z-index: 2000;
            align-items: center; justify-content: center;
            flex-direction: column;
            animation: matchFadeIn 0.5s ease;
        }
        
        @keyframes matchFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .match-modal.active { display: flex; }
        
        .match-avatars {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 24px;
        }
        
        .match-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background-size: cover; background-position: center;
            border: 3px solid var(--pink);
            box-shadow: 0 0 30px rgba(255,88,100,0.4);
            animation: matchAvatarPulse 1.5s ease infinite;
        }
        
        .match-avatar:nth-child(2) {
            border-color: var(--mint);
            box-shadow: 0 0 30px rgba(0,217,192,0.4);
            animation-delay: 0.2s;
        }
        
        @keyframes matchAvatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .match-heart {
            font-size: 40px;
            animation: heartBeat 1s ease infinite;
            filter: drop-shadow(0 0 10px rgba(255,88,100,0.6));
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }
        
        .match-title {
            font-size: 36px; font-weight: 800;
            background: var(--gradient-romantic);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .match-subtitle { color: var(--text-muted); margin-bottom: 8px; font-size: 16px; }
        .match-score { font-size: 48px; font-weight: 800; color: var(--pink); margin-bottom: 24px; }
        
        .match-actions {
            display: flex; gap: 16px;
        }
        
        .match-btn {
            padding: 14px 32px; border-radius: 28px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            border: none; transition: all 0.2s;
        }
        
        .match-btn.primary {
            background: var(--gradient-pink);
            color: white;
            box-shadow: 0 4px 20px rgba(255,88,100,0.4);
        }
        
        .match-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,88,100,0.5); }
        
        .match-btn.secondary {
            background: rgba(255,255,255,0.08); color: var(--text);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        /* 页面切换 */
        .page { display: none; animation: pageFadeIn 0.3s ease; }
        .page.active { display: block; }
        
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 匹配列表 */
        .match-list { padding: 16px; }
        
        .match-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px; border-radius: 16px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,88,100,0.05);
        }
        
        .match-item:hover { 
            background: rgba(255,88,100,0.05); 
            border-color: rgba(255,88,100,0.15);
            transform: translateX(4px);
        }
        
        .match-avatar-small {
            width: 56px; height: 56px; border-radius: 50%;
            background-size: cover; background-position: center;
            border: 2px solid var(--pink);
            position: relative;
        }
        
        .match-avatar-small::after {
            content: '';
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--mint); border: 2px solid var(--dark-card);
        }
        
        .match-info { flex: 1; }
        .match-name { font-weight: 600; margin-bottom: 3px; font-size: 15px; }
        .match-preview { font-size: 13px; color: var(--text-muted); }
        .match-time { font-size: 11px; color: var(--text-dim); }
        .match-score-badge {
            padding: 4px 10px; border-radius: 12px;
            background: rgba(255,88,100,0.15); color: var(--pink);
            font-size: 13px; font-weight: 700;
        }
        
        /* 聊天页面 */
        .chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 140px);
        }
        
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,88,100,0.08);
            display: flex; align-items: center; gap: 12px;
        }
        
        .chat-header-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--pink);
        }
        
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
        }
        
        .chat-message {
            display: flex; gap: 8px; margin-bottom: 12px;
            animation: messageSlideIn 0.3s ease;
        }
        
        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message.own { flex-direction: row-reverse; }
        
        .chat-bubble {
            max-width: 70%; padding: 10px 14px; border-radius: 18px;
            font-size: 14px; line-height: 1.4;
        }
        
        .chat-message:not(.own) .chat-bubble {
            background: rgba(255,255,255,0.08); color: var(--text);
            border-bottom-left-radius: 4px;
        }
        
        .chat-message.own .chat-bubble {
            background: var(--gradient-pink);
            color: white; font-weight: 500;
            border-bottom-right-radius: 4px;
        }
        
        /* 命理洞察卡片 */
        .insight-card {
            margin: 8px 16px; padding: 12px 16px;
            background: linear-gradient(135deg, rgba(0,217,192,0.1), rgba(0,217,192,0.03));
            border: 1px solid rgba(0,217,192,0.2);
            border-radius: 14px;
            font-size: 13px; color: var(--mint);
            animation: insightSlideIn 0.5s ease;
        }
        
        @keyframes insightSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-input-bar {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,88,100,0.08);
            display: flex; gap: 8px;
        }
        
        .chat-input {
            flex: 1; padding: 10px 16px; border-radius: 24px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text); font-size: 14px;
        }
        
        .chat-input:focus { outline: none; border-color: var(--pink); }
        
        .chat-send {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--gradient-pink); border: none;
            color: white; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,88,100,0.3);
            transition: all 0.2s;
        }
        
        .chat-send:hover { transform: scale(1.05); }
        .chat-send:active { transform: scale(0.95); }
        
        /* 社区页面 */
        .community-header {
            padding: 16px; border-bottom: 1px solid rgba(255,88,100,0.08);
        }
        
        .post-card {
            padding: 16px; border-bottom: 1px solid rgba(255,88,100,0.05);
            transition: background 0.2s;
        }
        
        .post-card:hover { background: rgba(255,88,100,0.02); }
        
        .post-author {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        
        .post-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--pink);
        }
        
        .post-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .post-content { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        
        .post-tags {
            display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
        }
        
        .post-tag {
            padding: 3px 10px; border-radius: 10px;
            background: rgba(255,88,100,0.1); color: var(--pink);
            font-size: 11px; font-weight: 500;
        }
        
        .post-stats {
            display: flex; gap: 16px; margin-top: 10px;
            font-size: 12px; color: var(--text-dim);
        }
        
        /* 专家页面 */
        .expert-card {
            padding: 16px; margin: 8px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px; border: 1px solid rgba(0,217,192,0.1);
            transition: all 0.2s;
        }
        
        .expert-card:hover {
            border-color: rgba(0,217,192,0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .expert-header {
            display: flex; gap: 14px; margin-bottom: 12px;
        }
        
        .expert-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--mint);
        }
        
        .expert-info { flex: 1; }
        .expert-name { font-size: 16px; font-weight: 600; }
        .expert-title { font-size: 13px; color: var(--mint); }
        .expert-rating { font-size: 13px; color: var(--text-muted); }
        
        .expert-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0;
        }
        
        .expert-tag {
            padding: 3px 10px; border-radius: 12px;
            background: rgba(0,217,192,0.1); color: var(--mint);
            font-size: 11px;
        }
        
        .expert-price {
            font-size: 18px; font-weight: 700; color: var(--pink);
        }
        
        .expert-book-btn {
            width: 100%; padding: 12px; margin-top: 10px;
            background: var(--gradient-mint);
            border: none; border-radius: 12px;
            color: var(--dark); font-weight: 700; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,217,192,0.3);
        }
        
        .expert-book-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,217,192,0.4); }
        
        /* 每日一卦 */
        .fortune-card {
            margin: 16px; padding: 24px;
            background: linear-gradient(135deg, rgba(255,88,100,0.08), rgba(0,217,192,0.05));
            border: 1px solid rgba(255,88,100,0.15);
            border-radius: 24px; text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .fortune-card::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,88,100,0.05) 0%, transparent 70%);
            animation: fortuneGlow 4s ease-in-out infinite;
        }
        
        @keyframes fortuneGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }
        
        .fortune-gua {
            font-size: 56px; margin-bottom: 8px;
            position: relative; z-index: 1;
        }
        
        .fortune-name {
            font-size: 22px; font-weight: 700; color: var(--pink);
            position: relative; z-index: 1;
        }

                            </div>

                            <span>${user.birth_place || ''}</span>
                        </div>
                        <div class="card-bio">${user.bio || '这个人很懒，什么都没写...'}</div>
                        <div class="radar-preview" onclick="showSixDimensions(${user.id}, event)">

                                <span class="radar-preview-title">六维度缘分匹配</span>

                            </div>

                        </div>

        // 绘制迷你雷达图
        function drawMiniRadar(canvasId, score) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            // Draw bar chart instead of radar for mini view
            const dims = ['五行', '三觀', '性格', '歲月', '溝通', '目標'];
            const values = [
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10
            ];
            
            const barW = (w - 40) / 6;
            const maxH = h - 20;
            
            dims.forEach((dim, i) => {
                const val = Math.max(20, Math.min(100, values[i]));
                const barH = (val / 100) * maxH;
                const x = 20 + i * barW;
                const y = h - 10 - barH;
                
                const gradient = ctx.createLinearGradient(0, y, 0, h - 10);
                gradient.addColorStop(0, 'rgba(255,88,100,0.8)');
                gradient.addColorStop(1, 'rgba(255,88,100,0.2)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x + 2, y, barW - 6, barH);
                
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(dim, x + barW / 2, h - 2);
            });
        }
        
        // 显示六维度详情
        async function showSixDimensions(partnerId, event) {
            event.stopPropagation();
            
            const modal = document.getElementById('sixDimModal');
            const content = document.getElementById('sixDimContent');
            modal.classList.add('active');
            
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在分析六维度缘分...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/six-dimensions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_a_id: currentUserId, user_b_id: partnerId })
                });
                const data = await res.json();
                const analysis = data.analysis;
                
                content.innerHTML = `
                    <div style="text-align:center;margin-bottom:20px;">
                        <div style="font-size:48px;font-weight:800;color:var(--pink);">${analysis.final_score}</div>
                        <div style="font-size:16px;color:var(--text-muted);">${analysis.rating}</div>
                    </div>
                    <div class="radar-container">
                        <canvas class="radar-canvas" id="radar-full" width="400" height="280"></canvas>
                    </div>
                    <div style="margin-top:20px;">
                        ${Object.entries(analysis.dimensions).map(([name, dim]) => {
                            const score = dim.score || dim.overall_score;
                            const color = DIMENSION_COLORS[name] || '#FF5864';
                            return `
                                <div class="dim-score-card">
                                    <div style="min-width:80px;font-size:14px;font-weight:600;">${name}</div>
                                    <div class="dim-score-bar">
                                        <div class="dim-score-fill" style="width:0%;background:${color};" data-width="${score}%"></div>
                                    </div>
                                    <div class="dim-score-value" style="color:${color};">${Math.round(score)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div style="margin-top:20px;padding:16px;background:rgba(0,217,192,0.05);border-radius:14px;border:1px solid rgba(0,217,192,0.15);">
                        <div style="font-size:14px;font-weight:600;color:var(--mint);margin-bottom:8px;">💡 缘分建议</div>
                        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;">${analysis.summary}</div>
                    </div>
                    <div style="margin-top:16px;padding:16px;background:rgba(255,88,100,0.05);border-radius:14px;border:1px solid rgba(255,88,100,0.15);">
                        <div style="font-size:14px;font-weight:600;color:var(--pink);margin-bottom:8px;">🎯 提升建议</div>
                        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;">
                            ${analysis.recommendations?.map(r => `<div style="margin-bottom:6px;">• ${r}</div>`).join('') || '多沟通，多理解，缘分自然来'}
                        </div>
                    </div>
                `;
                
                // Animate bars
                setTimeout(() => {
                    document.querySelectorAll('.dim-score-fill').forEach(bar => {
                        bar.style.width = bar.dataset.width;
                    });
                }, 300);
                
                // Draw full radar
                setTimeout(() => drawFullRadar('radar-full', analysis.radar_chart), 100);
                
            } catch (e) {
                content.innerHTML = '<div class="loading">分析失败，请重试</div>';
            }
        }
        
        // 绘制完整雷达图
        function drawFullRadar(canvasId, radarData) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2;
            const radius = Math.min(cx, cy) - 40;
            
            ctx.clearRect(0, 0, w, h);
            
            const dims = Object.keys(radarData);
            const values = Object.values(radarData);
            const angleStep = (Math.PI * 2) / dims.length;
            
            // Draw grid
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255,255,255,${0.05 + i * 0.02})`;
                ctx.lineWidth = 1;
                for (let j = 0; j < dims.length; j++) {
                    const angle = j * angleStep - Math.PI / 2;
                    const r = (radius / 5) * i;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // Draw data
            ctx.beginPath();
            values.forEach((val, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = (val / 100) * radius;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            gradient.addColorStop(0, 'rgba(255,88,100,0.3)');
            gradient.addColorStop(1, 'rgba(255,88,100,0.05)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = '#FF5864';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw points
            values.forEach((val, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = (val / 100) * radius;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#FF5864';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            // Draw labels
            dims.forEach((dim, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const x = cx + Math.cos(angle) * (radius + 20);
                const y = cy + Math.sin(angle) * (radius + 20);
                
                ctx.fillStyle = '#A0A0B8';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(dim, x, y);
            });
        }
        
        function closeSixDimModal() {
            document.getElementById('sixDimModal').classList.remove('active');
        }
        
        // 滑动操作
        async function swipe(direction) {
            if (currentCardIndex >= currentCards.length) return;
            
            const user = currentCards[currentCardIndex];
            const cards = document.querySelectorAll('.match-card');
            const topCard = cards[0];
            
            const translateX = direction === 'left' ? -400 : direction === 'right' ? 400 : 0;
            const rotate = direction === 'left' ? -25 : direction === 'right' ? 25 : 0;
            topCard.style.transform = `translateX(${translateX}px) rotate(${rotate}deg)`;
            topCard.style.opacity = '0';
            
            try {
                const res = await fetch(`${API_BASE}/swipe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        swiper_id: currentUserId,
                        swiped_id: user.id,
                        direction: direction === 'super' ? 'super' : direction === 'right' ? 'right' : 'left'
                    })
                });
                const data = await res.json();
                
                if (data.result?.matched) {
                    showMatchModal(data.result, user);
                }
            } catch (e) { console.error('Swipe error:', e); }
            
            setTimeout(() => {
                currentCardIndex++;
                renderCards();
            }, 300);
        }

            try {

                list.innerHTML = data.matches?.map(m => `
                    <div class="match-item" onclick="openChat(${m.id}, ${m.partner_id})">

        // 打开聊天
        async function openChat(matchId, partnerId) {
            currentMatchId = matchId;
            currentPartnerId = partnerId;
            showPage('chat');
            
            try {
                const [messagesRes, partnerRes] = await Promise.all([
                    fetch(`${API_BASE}/matches/${matchId}/messages`),
                    fetch(`${API_BASE}/users/${partnerId}`)
                ]);
                
                const messagesData = await messagesRes.json();
                const partnerData = await partnerRes.json();
                currentPartnerData = partnerData.user;
                
                document.getElementById('chatPartnerName').textContent = partnerData.user?.nickname || '未知';
                document.getElementById('chatPartnerAvatar').style.backgroundImage = `url('${partnerData.user?.avatar_url || ''}')`;
                
                const container = document.getElementById('chatMessages');
                container.innerHTML = messagesData.messages?.map(m => `
                    <div class="chat-message ${m.sender_id === currentUserId ? 'own' : ''}">
                        <div class="chat-bubble">${m.content}</div>
                    </div>
                `).join('') || '<div class="loading" style="padding:20px;">开始聊天吧，缘分从这里开始 💕</div>';
                
                container.scrollTop = container.scrollHeight;
                
                // Add insight card
                if (partnerData.user?.fxti_element) {
                    const insight = document.createElement('div');
                    insight.className = 'insight-card';
                    insight.innerHTML = `💕 命理洞察：你们${partnerData.user.fxti_element}命相合，今日宜深入交流`;
                    container.appendChild(insight);
                }
            } catch (e) { console.error('Chat load error:', e); }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content || !currentMatchId) return;
            
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="chat-message own">
                    <div class="chat-bubble">${content}</div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            input.value = '';
            
            try {
                await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        match_id: currentMatchId,
                        sender_id: currentUserId,
                        receiver_id: currentPartnerId || 0,
                        content: content
                    })
                });
                
                // Earn coins for sending message
                await fetch(`${API_BASE}/users/${currentUserId}/coins/earn?action=send_message`, { method: 'POST' });
                loadCoins();
            } catch (e) { console.error('Send error:', e); }

                    alert(`預約成功！\n預約編號: #${data.booking.id}\n費用: $${data.price} HKD`);
                    closeBookingModal();
                    // 扣除金幣
                    loadCoins();
                } else {
                    alert('預約失敗: ' + (data.detail || '未知錯誤'));
                }
            } catch (e) {
                alert('預約失敗，請稍後重試');
                console.error('Booking error:', e);
            }
        }
        
        // 模糊照片系統 - 專利規避：互動解鎖
        async function checkPhotoReveal(userId) {
            try {
                const res = await fetch(`${API_BASE}/users/${userId}/blurred-photo?viewer_id=${currentUserId}`);
                const data = await res.json();
                return data;
            } catch (e) {
                console.error('Photo reveal check error:', e);
                return { is_revealed: false, reveal_progress: 0 };
            }
        }
        
        async function revealPhoto(userId) {
            try {
                // 檢查金幣餘額
                const coinRes = await fetch(`${API_BASE}/users/${currentUserId}/coins`);
                const coinData = await coinRes.json();
                
                if (coinData.coins < 50) {
                    alert('金幣不足！需要50金幣解鎖照片\n發送消息或每日簽到可獲得金幣');
                    return false;
                }
                
                // 扣除金幣並解鎖
                const res = await fetch(`${API_BASE}/users/${currentUserId}/coins/spend?action=reveal_photo&target_id=${userId}`, {
                    method: 'POST'
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    loadCoins();
                    return true;
                }
                return false;
            } catch (e) {
                console.error('Reveal photo error:', e);
                return false;
            }
        }
        
        // 更新卡片渲染 - Tinder 風格全屏照片 + 底部信息覆蓋
        async function renderCardsWithBlur() {
            const stack = document.getElementById('cardStack');
            stack.innerHTML = '';
            
            const cardsToRender = currentCards.slice(currentCardIndex, currentCardIndex + 3);
            
            for (let i = 0; i < cardsToRender.length; i++) {
                const user = cardsToRender[i];
                const wuxing = WUXING_SYMBOLS[user.fxti_element] || WUXING_SYMBOLS['木'];
                const age = user.birth_date ? Math.floor((new Date() - new Date(user.birth_date)) / 31557600000) : '--';
                
                // 檢查照片解鎖狀態
                const photoStatus = await checkPhotoReveal(user.id);
                const isRevealed = photoStatus.is_revealed;
                const compatScore = user.compatibility_score || 75;
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.style.zIndex = 3 - i;
                card.dataset.userId = user.id;
                card.dataset.index = i;
                
                // Tinder 風格：全屏照片 + 底部信息覆蓋層
                card.innerHTML = `
                    <div class="card-image-full ${isRevealed ? '' : 'blurred-photo'}" 
                         style="background-image: url('${user.avatar_url}')"
                         id="card-image-${user.id}">
                        
                        <!-- 頂部五行標籤 -->
                        <div class="wuxing-badge" style="background: ${wuxing.color}CC;">
                            <span>${wuxing.symbol}</span>
                            <span>${user.fxti_element}命 · ${wuxing.desc}</span>
                        </div>
                        
                        <!-- 匹配度標籤 -->
                        <div class="compatibility-badge">
                            ${compatScore}分 匹配
                        </div>
                        
                        <!-- 滑動指示器 -->
                        <div class="swipe-indicator like" id="like-indicator-${user.id}">LIKE</div>
                        <div class="swipe-indicator nope" id="nope-indicator-${user.id}">NOPE</div>
                        
                        <!-- 五行解鎖遮罩（未解鎖時顯示） -->
                        ${!isRevealed ? `
                        <div class="wuxing-overlay" id="overlay-${user.id}" onclick="handleRevealClick(event, ${user.id})">
                            <div class="wuxing-card">
                                <div class="wuxing-symbol">${wuxing.symbol}</div>
                                <div class="wuxing-name">${user.fxti_element}命</div>
                                <div class="wuxing-desc">${wuxing.desc}</div>
                                <div class="wuxing-hint">點擊解鎖照片 (50金幣)</div>
                                <div class="reveal-progress-bar">
                                    <div class="reveal-progress-fill" style="width: ${photoStatus.reveal_progress || 0}%"></div>
                                </div>
                            </div>
                        </div>
                        ` : ''}
                        
                        <!-- 底部信息覆蓋層 -->
                        <div class="card-info-overlay">
                            <div class="card-header">
                                <span class="card-name">${user.nickname}</span>
                                <span class="card-age">${age}</span>
                                ${user.is_verified ? '<span class="card-badge badge-verified">✓</span>' : ''}
                                ${user.is_premium ? '<span class="card-badge badge-premium">👑</span>' : ''}
                            </div>
                            <div class="card-meta">
                                <span>${user.fxti_profile_name || '緣分探索者'}</span>
                                <span>·</span>
                                <span>${user.birth_place || '未知地'}</span>
                            </div>
                            <div class="card-bio">${user.bio || '這個人很懶，什麼都沒寫...'}</div>
                            
                            <!-- 六維度迷你預覽 -->
                            <div class="radar-preview" onclick="showSixDimensions(${user.id}, event)" 
                                 style="margin-top: 10px; padding: 8px 12px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); border-radius: 10px; border: 1px solid rgba(255,255,255,0.1);">
                                <div class="radar-preview-header">
                                    <span class="radar-preview-title" style="color: rgba(255,255,255,0.8);">六維度緣分</span>
                                    <span class="radar-preview-score" style="color: #fff;">${compatScore}分</span>
                                </div>
                                <canvas class="radar-mini-canvas" id="radar-mini-${user.id}" width="300" height="60"></canvas>
                            </div>
                        </div>
                    </div>
                `;
                stack.appendChild(card);
                
                // Draw mini radar
                setTimeout(() => drawMiniRadar(`radar-mini-${user.id}`, compatScore), 100);
                
                // 為頂層卡片添加滑動手勢
                if (i === 0) {
                    addSwipeGesture(card, user.id);
                }
            }
            
            if (currentCards.length === 0) {
                stack.innerHTML = '<div class="loading">暫無更多推薦<br><small>稍後再來看看</small></div>';
            }
        }
        
        // Tinder 風格滑動手勢支持
        function addSwipeGesture(cardElement, userId) {
            let startX = 0, startY = 0;
            let currentX = 0, currentY = 0;
            let isDragging = false;
            
            const likeIndicator = document.getElementById(`like-indicator-${userId}`);
            const nopeIndicator = document.getElementById(`nope-indicator-${userId}`);
            
            function updateCardPosition(x, y, rotate) {
                cardElement.style.transform = `translateX(${x}px) translateY(${y}px) rotate(${rotate}deg)`;
                
                // 更新指示器透明度
                if (likeIndicator && x > 0) {
                    likeIndicator.classList.add('visible');
                    likeIndicator.style.opacity = Math.min(x / 100, 1);
                    if (nopeIndicator) nopeIndicator.classList.remove('visible');
                } else if (nopeIndicator && x < 0) {
                    nopeIndicator.classList.add('visible');
                    nopeIndicator.style.opacity = Math.min(Math.abs(x) / 100, 1);
                    if (likeIndicator) likeIndicator.classList.remove('visible');
                } else {
                    if (likeIndicator) likeIndicator.classList.remove('visible');
                    if (nopeIndicator) nopeIndicator.classList.remove('visible');
                }
            }
            
            function resetCard() {
                cardElement.style.transition = 'transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                cardElement.style.transform = '';
                if (likeIndicator) likeIndicator.classList.remove('visible');
                if (nopeIndicator) nopeIndicator.classList.remove('visible');
                setTimeout(() => {
                    cardElement.style.transition = '';
                }, 300);
            }
            
            // 觸摸事件
            cardElement.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                startY = e.touches[0].clientY;
                isDragging = true;
                cardElement.style.transition = 'none';
            }, { passive: true });
            
            cardElement.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                currentX = e.touches[0].clientX - startX;
                currentY = e.touches[0].clientY - startY;
                const rotate = currentX * 0.05;
                updateCardPosition(currentX, currentY, rotate);
            }, { passive: true });
            
            cardElement.addEventListener('touchend', (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const threshold = 100; // 滑動閾值
                
                if (currentX > threshold) {
                    // 右滑 - LIKE
                    cardElement.style.transition = 'transform 0.3s ease';
                    cardElement.style.transform = `translateX(400px) rotate(30deg)`;
                    cardElement.style.opacity = '0';
                    setTimeout(() => swipe('right'), 300);
                } else if (currentX < -threshold) {
                    // 左滑 - NOPE
                    cardElement.style.transition = 'transform 0.3s ease';
                    cardElement.style.transform = `translateX(-400px) rotate(-30deg)`;
                    cardElement.style.opacity = '0';
                    setTimeout(() => swipe('left'), 300);
                } else {
                    // 未超過閾值 - 回彈
                    resetCard();
                }
                
                currentX = 0;
                currentY = 0;
            });
            
            // 鼠標事件（桌面端）
            cardElement.addEventListener('mousedown', (e) => {
                startX = e.clientX;
                startY = e.clientY;
                isDragging = true;
                cardElement.style.transition = 'none';
                e.preventDefault();
            });
            
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                currentX = e.clientX - startX;
                currentY = e.clientY - startY;
                const rotate = currentX * 0.05;
                updateCardPosition(currentX, currentY, rotate);
            });
            
            document.addEventListener('mouseup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                
                const threshold = 100;
                
                if (currentX > threshold) {
                    cardElement.style.transition = 'transform 0.3s ease';
                    cardElement.style.transform = `translateX(400px) rotate(30deg)`;
                    cardElement.style.opacity = '0';
                    setTimeout(() => swipe('right'), 300);
                } else if (currentX < -threshold) {
                    cardElement.style.transition = 'transform 0.3s ease';
                    cardElement.style.transform = `translateX(-400px) rotate(-30deg)`;
                    cardElement.style.opacity = '0';
                    setTimeout(() => swipe('left'), 300);
                } else {
                    resetCard();
                }
                
                currentX = 0;
                currentY = 0;
            });
        }
        
        // 處理解鎖點擊
        async function handleRevealClick(event, userId) {
            event.stopPropagation();
            
            if (confirm('花費50金幣解鎖對方照片？\n\n解鎖後可查看清晰照片和更多資料')) {
                const success = await revealPhoto(userId);
                if (success) {
                    // 更新UI
                    const imgDiv = document.getElementById(`card-image-${userId}`);
                    const overlay = document.getElementById(`overlay-${userId}`);
                    if (imgDiv) imgDiv.classList.remove('blurred-photo');
                    if (overlay) overlay.classList.add('revealed');
                    alert('照片已解鎖！');
                }
            }
        }
        
        // 鍵盤事件
                }
            }
        }
            const modal = document.getElementById('bookingModal');
            const expertId = parseInt(modal.dataset.expertId);
            const date = document.getElementById('bookingDate').value;
            const time = document.getElementById('bookingTime').value;
            const topic = document.getElementById('bookingTopic').value;
            const type = document.getElementById('bookingType').value;
            const desc = document.getElementById('bookingDesc').value;
            
            if (!date || !time || !topic) {
                alert('請填寫完整預約信息');
                return;
            }
            
            try {
                const res = await fetch(`${API_BASE}/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        client_id: currentUserId,
                        expert_id: expertId,
                        booking_type: type,
                        booking_date: date,
                        booking_time: time,
                        topic: topic,
                        description: desc
                    })
                });
                
                const data = await res.json();
                
                if (data.status === 'success') {
                    alert(`預約成功！\n預約編號: #${data.booking.id}\n費用: $${data.price} HKD`);
                    closeBookingModal();
                    // 扣除金幣
                    loadCoins();
                } else {
                    alert('預約失敗: ' + (data.detail || '未知錯誤'));
                }
            } catch (e) {
                alert('預約失敗，請稍後重試');
                console.error('Booking error:', e);
            }
        }
        
        // 鍵盤事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') swipe('left');
            if (e.key === 'ArrowRight') swipe('right');
            if (e.key === 'Enter' && document.getElementById('chatInput') === document.activeElement) {
                sendMessage();
            }
        });
        
        // 初始化
        loadDiscover();
        loadCoins();
    </script>
