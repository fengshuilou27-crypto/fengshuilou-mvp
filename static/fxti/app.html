<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FXTI 緣分配對 - 五行社交匹配</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            /* Tinder-inspired Pink + Mint Green palette */
            --pink: #FF5864;
            --pink-light: #FF7B82;
            --pink-dark: #E84855;
            --mint: #00D9C0;
            --mint-light: #4FF0D8;
            --mint-dark: #00B8A3;
            --dark: #1A1A2E;
            --dark-card: #252540;
            --dark-lighter: #32325A;
            --text: #FFFFFF;
            --text-muted: #A0A0B8;
            --text-dim: #6B6B8A;
            --gradient-pink: linear-gradient(135deg, #FF5864, #FF8A98);
            --gradient-mint: linear-gradient(135deg, #00D9C0, #4FF0D8);
            --gradient-romantic: linear-gradient(135deg, #FF5864, #FF8A98, #FFB6C1);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.3);
            --shadow-glow: 0 0 20px rgba(255,88,100,0.3);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* ===== Netflix-style Logo Animation ===== */
        .logo-container {
            position: relative;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }
        
        .logo-icon {
            width: 36px; height: 36px;
            background: var(--gradient-pink);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            animation: logoPulse 2s ease-in-out infinite;
            box-shadow: 0 0 15px rgba(255,88,100,0.4);
        }
        
        @keyframes logoPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255,88,100,0.4); }
            50% { transform: scale(1.08); box-shadow: 0 0 25px rgba(255,88,100,0.6); }
        }
        
        .logo-text {
            font-size: 22px; font-weight: 800;
            background: var(--gradient-romantic);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }
        
        /* 顶部导航 */
        .top-nav {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,88,100,0.1);
            padding: 12px 16px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 1000;
        }
        
        .nav-actions {
            display: flex; gap: 12px; align-items: center;
        }
        
        .nav-btn {
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 16px;
            transition: all 0.2s;
        }
        
        .nav-btn:hover { background: rgba(255,88,100,0.15); border-color: var(--pink); }
        .nav-btn.active { background: rgba(255,88,100,0.2); border-color: var(--pink); color: var(--pink); }
        
        .coin-badge {
            display: flex; align-items: center; gap: 4px;
            padding: 4px 10px; border-radius: 16px;
            background: rgba(255,193,7,0.15);
            border: 1px solid rgba(255,193,7,0.3);
            font-size: 13px; font-weight: 600; color: #FFC107;
        }
        
        /* 主内容区 */
        .main-content {
            padding-top: 60px; padding-bottom: 80px;
            max-width: 430px; margin: 0 auto;
        }
        
        /* ===== Tinder-style Card Stack ===== */
        .card-stack {
            position: relative;
            width: 100%; height: 540px;
            margin: 16px auto;
            perspective: 1000px;
        }
        
        .match-card {
            position: absolute; top: 0; left: 16px; right: 16px;
            height: 100%;
            background: var(--dark-card);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-card);
            transition: transform 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.3s ease;
            border: 1px solid rgba(255,88,100,0.08);
            will-change: transform;
        }
        
        .match-card:nth-child(2) { transform: scale(0.96) translateY(12px); opacity: 0.5; z-index: -1; }
        .match-card:nth-child(3) { transform: scale(0.92) translateY(24px); opacity: 0.25; z-index: -2; }
        
        .card-image {
            width: 100%; height: 68%;
            background-size: cover; background-position: center;
            position: relative;
        }
        
        .card-image::after {
            content: '';
            position: absolute; bottom: 0; left: 0; right: 0;
            height: 120px;
            background: linear-gradient(transparent, var(--dark-card));
        }
        
        /* 五行元素遮罩（专利规避：互动解锁） */
        .wuxing-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(26,26,46,0.85);
            backdrop-filter: blur(8px);
            transition: opacity 0.6s ease, backdrop-filter 0.6s ease;
        }
        
        .wuxing-overlay.revealed { opacity: 0; pointer-events: none; backdrop-filter: blur(0); }
        
        .wuxing-card {
            width: 180px; height: 240px;
            background: linear-gradient(135deg, rgba(255,88,100,0.15), rgba(0,217,192,0.08));
            border: 2px solid var(--pink);
            border-radius: 20px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(255,88,100,0.2);
            animation: wuxingFloat 3s ease-in-out infinite;
        }
        
        @keyframes wuxingFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .wuxing-symbol {
            font-size: 56px; margin-bottom: 12px;
            filter: drop-shadow(0 0 10px rgba(255,88,100,0.5));
        }
        
        .wuxing-name {
            font-size: 22px; font-weight: 700; color: var(--pink);
            margin-bottom: 6px;
        }
        
        .wuxing-desc {
            font-size: 13px; color: var(--text-muted);
        }
        
        .wuxing-hint {
            margin-top: 16px; font-size: 12px;
            color: var(--mint); font-weight: 500;
        }
        
        .card-info {
            padding: 16px 20px 20px;
            position: relative;
            z-index: 2;
        }
        
        .card-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
        }
        
        .card-name {
            font-size: 24px; font-weight: 700;
        }
        
        .card-age {
            font-size: 18px; color: var(--text-muted); font-weight: 500;
        }
        
        .card-badge {
            padding: 3px 10px; border-radius: 12px;
            font-size: 11px; font-weight: 600;
        }
        
        .badge-verified {
            background: rgba(0,217,192,0.15); color: var(--mint);
        }
        
        .badge-premium {
            background: linear-gradient(135deg, rgba(255,88,100,0.2), rgba(255,138,152,0.1));
            color: var(--pink); border: 1px solid rgba(255,88,100,0.3);
        }
        
        .card-meta {
            display: flex; gap: 12px; margin-bottom: 10px;
            font-size: 13px; color: var(--text-muted);
        }
        
        .card-bio {
            font-size: 14px; color: var(--text-muted); line-height: 1.5;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        /* 六维度雷达图预览 */
        .radar-preview {
            margin-top: 12px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            border: 1px solid rgba(255,88,100,0.08);
        }
        
        .radar-preview-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 8px;
        }
        
        .radar-preview-title {
            font-size: 12px; color: var(--text-muted);
        }
        
        .radar-preview-score {
            font-size: 16px; font-weight: 700; color: var(--pink);
        }
        
        .radar-mini-canvas {
            width: 100%; height: 80px;
        }
        
        /* 滑动按钮 */
        .swipe-actions {
            display: flex; justify-content: center; gap: 24px;
            padding: 16px;
        }
        
        .swipe-btn {
            width: 64px; height: 64px; border-radius: 50%;
            border: 2px solid; background: transparent;
            font-size: 28px; cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        
        .swipe-btn:hover { transform: scale(1.15); }
        .swipe-btn:active { transform: scale(0.95); }
        
        .swipe-btn.pass { 
            border-color: #FF6B6B; color: #FF6B6B;
            background: rgba(255,107,107,0.05);
        }
        .swipe-btn.pass:hover { background: rgba(255,107,107,0.15); box-shadow: 0 0 20px rgba(255,107,107,0.3); }
        
        .swipe-btn.like { 
            border-color: var(--pink); color: var(--pink);
            background: rgba(255,88,100,0.05);
            width: 72px; height: 72px; font-size: 32px;
        }
        .swipe-btn.like:hover { 
            background: rgba(255,88,100,0.15); 
            box-shadow: 0 0 25px rgba(255,88,100,0.4);
        }
        
        .swipe-btn.super { 
            border-color: var(--mint); color: var(--mint);
            background: rgba(0,217,192,0.05);
        }
        .swipe-btn.super:hover { 
            background: rgba(0,217,192,0.15); 
            box-shadow: 0 0 20px rgba(0,217,192,0.3);
        }
        
        /* 底部导航 */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(26,26,46,0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,88,100,0.08);
            display: flex; justify-content: space-around;
            padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
            z-index: 1000;
        }
        
        .bottom-nav-item {
            text-decoration: none; color: var(--text-dim);
            font-size: 11px; text-align: center;
            padding: 4px 16px; transition: all 0.2s;
            border: none; background: none; cursor: pointer;
            position: relative;
        }
        
        .bottom-nav-item.active { color: var(--pink); }
        .bottom-nav-item.active::after {
            content: '';
            position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 3px; border-radius: 2px;
            background: var(--gradient-pink);
        }
        
        .bottom-nav-item .icon { font-size: 22px; display: block; margin-bottom: 2px; }
        
        /* 匹配成功动画 */
        .match-modal {
            display: none; position: fixed; inset: 0;
            background: rgba(26,26,46,0.97);
            z-index: 2000;
            align-items: center; justify-content: center;
            flex-direction: column;
            animation: matchFadeIn 0.5s ease;
        }
        
        @keyframes matchFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .match-modal.active { display: flex; }
        
        .match-avatars {
            display: flex; align-items: center; gap: 20px;
            margin-bottom: 24px;
        }
        
        .match-avatar {
            width: 100px; height: 100px; border-radius: 50%;
            background-size: cover; background-position: center;
            border: 3px solid var(--pink);
            box-shadow: 0 0 30px rgba(255,88,100,0.4);
            animation: matchAvatarPulse 1.5s ease infinite;
        }
        
        .match-avatar:nth-child(2) {
            border-color: var(--mint);
            box-shadow: 0 0 30px rgba(0,217,192,0.4);
            animation-delay: 0.2s;
        }
        
        @keyframes matchAvatarPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        .match-heart {
            font-size: 40px;
            animation: heartBeat 1s ease infinite;
            filter: drop-shadow(0 0 10px rgba(255,88,100,0.6));
        }
        
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.2); }
            50% { transform: scale(1); }
            75% { transform: scale(1.15); }
        }
        
        .match-title {
            font-size: 36px; font-weight: 800;
            background: var(--gradient-romantic);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .match-subtitle { color: var(--text-muted); margin-bottom: 8px; font-size: 16px; }
        .match-score { font-size: 48px; font-weight: 800; color: var(--pink); margin-bottom: 24px; }
        
        .match-actions {
            display: flex; gap: 16px;
        }
        
        .match-btn {
            padding: 14px 32px; border-radius: 28px;
            font-size: 16px; font-weight: 600; cursor: pointer;
            border: none; transition: all 0.2s;
        }
        
        .match-btn.primary {
            background: var(--gradient-pink);
            color: white;
            box-shadow: 0 4px 20px rgba(255,88,100,0.4);
        }
        
        .match-btn.primary:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,88,100,0.5); }
        
        .match-btn.secondary {
            background: rgba(255,255,255,0.08); color: var(--text);
            border: 1px solid rgba(255,255,255,0.15);
        }
        
        /* 页面切换 */
        .page { display: none; animation: pageFadeIn 0.3s ease; }
        .page.active { display: block; }
        
        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* 匹配列表 */
        .match-list { padding: 16px; }
        
        .match-item {
            display: flex; align-items: center; gap: 16px;
            padding: 14px; border-radius: 16px;
            background: rgba(255,255,255,0.03);
            margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255,88,100,0.05);
        }
        
        .match-item:hover { 
            background: rgba(255,88,100,0.05); 
            border-color: rgba(255,88,100,0.15);
            transform: translateX(4px);
        }
        
        .match-avatar-small {
            width: 56px; height: 56px; border-radius: 50%;
            background-size: cover; background-position: center;
            border: 2px solid var(--pink);
            position: relative;
        }
        
        .match-avatar-small::after {
            content: '';
            position: absolute; bottom: 2px; right: 2px;
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--mint); border: 2px solid var(--dark-card);
        }
        
        .match-info { flex: 1; }
        .match-name { font-weight: 600; margin-bottom: 3px; font-size: 15px; }
        .match-preview { font-size: 13px; color: var(--text-muted); }
        .match-time { font-size: 11px; color: var(--text-dim); }
        .match-score-badge {
            padding: 4px 10px; border-radius: 12px;
            background: rgba(255,88,100,0.15); color: var(--pink);
            font-size: 13px; font-weight: 700;
        }
        
        /* 聊天页面 */
        .chat-container {
            display: flex; flex-direction: column;
            height: calc(100vh - 140px);
        }
        
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,88,100,0.08);
            display: flex; align-items: center; gap: 12px;
        }
        
        .chat-header-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--pink);
        }
        
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 16px;
        }
        
        .chat-message {
            display: flex; gap: 8px; margin-bottom: 12px;
            animation: messageSlideIn 0.3s ease;
        }
        
        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-message.own { flex-direction: row-reverse; }
        
        .chat-bubble {
            max-width: 70%; padding: 10px 14px; border-radius: 18px;
            font-size: 14px; line-height: 1.4;
        }
        
        .chat-message:not(.own) .chat-bubble {
            background: rgba(255,255,255,0.08); color: var(--text);
            border-bottom-left-radius: 4px;
        }
        
        .chat-message.own .chat-bubble {
            background: var(--gradient-pink);
            color: white; font-weight: 500;
            border-bottom-right-radius: 4px;
        }
        
        /* 命理洞察卡片 */
        .insight-card {
            margin: 8px 16px; padding: 12px 16px;
            background: linear-gradient(135deg, rgba(0,217,192,0.1), rgba(0,217,192,0.03));
            border: 1px solid rgba(0,217,192,0.2);
            border-radius: 14px;
            font-size: 13px; color: var(--mint);
            animation: insightSlideIn 0.5s ease;
        }
        
        @keyframes insightSlideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .chat-input-bar {
            padding: 12px 16px;
            border-top: 1px solid rgba(255,88,100,0.08);
            display: flex; gap: 8px;
        }
        
        .chat-input {
            flex: 1; padding: 10px 16px; border-radius: 24px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--text); font-size: 14px;
        }
        
        .chat-input:focus { outline: none; border-color: var(--pink); }
        
        .chat-send {
            width: 44px; height: 44px; border-radius: 50%;
            background: var(--gradient-pink); border: none;
            color: white; font-size: 18px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255,88,100,0.3);
            transition: all 0.2s;
        }
        
        .chat-send:hover { transform: scale(1.05); }
        .chat-send:active { transform: scale(0.95); }
        
        /* 社区页面 */
        .community-header {
            padding: 16px; border-bottom: 1px solid rgba(255,88,100,0.08);
        }
        
        .post-card {
            padding: 16px; border-bottom: 1px solid rgba(255,88,100,0.05);
            transition: background 0.2s;
        }
        
        .post-card:hover { background: rgba(255,88,100,0.02); }
        
        .post-author {
            display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
        }
        
        .post-avatar {
            width: 36px; height: 36px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--pink);
        }
        
        .post-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
        .post-content { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
        
        .post-tags {
            display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
        }
        
        .post-tag {
            padding: 3px 10px; border-radius: 10px;
            background: rgba(255,88,100,0.1); color: var(--pink);
            font-size: 11px; font-weight: 500;
        }
        
        .post-stats {
            display: flex; gap: 16px; margin-top: 10px;
            font-size: 12px; color: var(--text-dim);
        }
        
        /* 专家页面 */
        .expert-card {
            padding: 16px; margin: 8px 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 16px; border: 1px solid rgba(0,217,192,0.1);
            transition: all 0.2s;
        }
        
        .expert-card:hover {
            border-color: rgba(0,217,192,0.25);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .expert-header {
            display: flex; gap: 14px; margin-bottom: 12px;
        }
        
        .expert-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background-size: cover; border: 2px solid var(--mint);
        }
        
        .expert-info { flex: 1; }
        .expert-name { font-size: 16px; font-weight: 600; }
        .expert-title { font-size: 13px; color: var(--mint); }
        .expert-rating { font-size: 13px; color: var(--text-muted); }
        
        .expert-tags {
            display: flex; flex-wrap: wrap; gap: 6px; margin: 8px 0;
        }
        
        .expert-tag {
            padding: 3px 10px; border-radius: 12px;
            background: rgba(0,217,192,0.1); color: var(--mint);
            font-size: 11px;
        }
        
        .expert-price {
            font-size: 18px; font-weight: 700; color: var(--pink);
        }
        
        .expert-book-btn {
            width: 100%; padding: 12px; margin-top: 10px;
            background: var(--gradient-mint);
            border: none; border-radius: 12px;
            color: var(--dark); font-weight: 700; cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,217,192,0.3);
        }
        
        .expert-book-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,217,192,0.4); }
        
        /* 每日一卦 */
        .fortune-card {
            margin: 16px; padding: 24px;
            background: linear-gradient(135deg, rgba(255,88,100,0.08), rgba(0,217,192,0.05));
            border: 1px solid rgba(255,88,100,0.15);
            border-radius: 24px; text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .fortune-card::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,88,100,0.05) 0%, transparent 70%);
            animation: fortuneGlow 4s ease-in-out infinite;
        }
        
        @keyframes fortuneGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(5%, 5%); }
        }
        
        .fortune-gua {
            font-size: 56px; margin-bottom: 8px;
            position: relative; z-index: 1;
        }
        
        .fortune-name {
            font-size: 22px; font-weight: 700; color: var(--pink);
            position: relative; z-index: 1;
        }
        
        .fortune-score {

        /* 六维度详情弹窗 */

        .six-dim-header {
            padding: 16px;
            display: flex; align-items: center; justify-content: space-between;

        .six-dim-close {

            color: var(--text); font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        
        .six-dim-content {
            padding: 20px;
            max-width: 430px; margin: 0 auto;
        }
        
        .radar-container {
            width: 100%; height: 280px;
            margin: 20px 0;
            position: relative;
        }
        
        .radar-canvas {
            width: 100%; height: 100%;
        }
        
        .dim-score-card {
            padding: 14px 16px; margin-bottom: 10px;
            background: rgba(255,255,255,0.03);

        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 模糊照片效果 */

        .blurred-photo.revealed {

</head>

    <div class="six-dim-modal" id="sixDimModal">
        <div class="six-dim-header">

        </div>
        <div class="six-dim-content" id="sixDimContent">
            <!-- 动态生成 -->
        </div>
    </div>

    <script>
        // 全局状态
        let currentUserId = 1;
        let currentCards = [];
        let currentCardIndex = 0;
        let currentMatchId = null;
        let currentPartnerId = null;
        let currentPartnerData = null;
        
        const API_BASE = '/api/fxti/v2';
        
        const WUXING_SYMBOLS = {
            '木': { symbol: '🌲', color: '#4CAF50', desc: '生机勃勃' },
            '火': { symbol: '🔥', color: '#FF5722', desc: '热情奔放' },
            '土': { symbol: '⛰️', color: '#FFC107', desc: '稳重踏实' },
            '金': { symbol: '⚔️', color: '#E0E0E0', desc: '果断坚毅' },
            '水': { symbol: '💧', color: '#2196F3', desc: '智慧灵动' }
        };
        
        const DIMENSION_COLORS = {
            '五行命理': '#FF5864',
            '三觀契合': '#00D9C0',
            '性格互補': '#FF8A98',
            '歲月磨合': '#4FF0D8',
            '溝通模式': '#FFB6C1',
            '目標一致': '#00B8A3'
        };
        
        // 页面切换
        function showPage(page) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.bottom-nav-item').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById('page-' + page).classList.add('active');
            
            const navMap = { discover: 0, matches: 1, community: 2, experts: 3, fortune: 4, chat: 1 };
            const navIdx = navMap[page];
            if (navIdx !== undefined) {
                document.querySelectorAll('.bottom-nav-item')[navIdx]?.classList.add('active');
            }
            
            if (page === 'discover') loadDiscover();
            if (page === 'matches') loadMatches();
            if (page === 'community') loadCommunity();
            if (page === 'experts') loadExperts();
            if (page === 'fortune') loadFortune();
        }
        
        // 加载用户金币
        async function loadCoins() {
            try {
                const res = await fetch(`${API_BASE}/users/${currentUserId}/coins`);
                const data = await res.json();
                document.getElementById('coinBalance').textContent = data.coins || 0;
            } catch (e) { console.error('Load coins error:', e); }
        }
        
        // 加载发现卡片
        async function loadDiscover() {
            const stack = document.getElementById('cardStack');
            stack.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`${API_BASE}/discover?user_id=${currentUserId}&limit=5`);
                const data = await res.json();
                currentCards = data.users || [];
                currentCardIndex = 0;
                renderCards();
            } catch (e) {
                stack.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        function renderCards() {
            const stack = document.getElementById('cardStack');
            stack.innerHTML = '';
            
            currentCards.slice(currentCardIndex, currentCardIndex + 3).forEach((user, i) => {
                const wuxing = WUXING_SYMBOLS[user.fxti_element] || WUXING_SYMBOLS['木'];
                const age = user.birth_date ? Math.floor((new Date() - new Date(user.birth_date)) / 31557600000) : '--';
                
                const card = document.createElement('div');
                card.className = 'match-card';
                card.style.zIndex = 3 - i;
                card.innerHTML = `
                    <div class="card-image" style="background-image: url('${user.avatar_url}')">
                        <div class="wuxing-overlay" id="overlay-${user.id}">
                            <div class="wuxing-card">
                                <div class="wuxing-symbol">${wuxing.symbol}</div>
                                <div class="wuxing-name">${user.fxti_element}命</div>
                                <div class="wuxing-desc">${wuxing.desc}</div>
                                <div class="wuxing-hint">右滑解锁照片</div>
                            </div>
                        </div>
                    </div>
                    <div class="card-info">
                        <div class="card-header">
                            <span class="card-name">${user.nickname}</span>
                            <span class="card-age">${age}</span>
                            ${user.is_verified ? '<span class="card-badge badge-verified">✓ 认证</span>' : ''}
                            ${user.is_premium ? '<span class="card-badge badge-premium">👑 VIP</span>' : ''}
                        </div>
                        <div class="card-meta">
                            <span>${user.fxti_profile_name || ''}</span>
                            <span>${user.birth_place || ''}</span>
                        </div>
                        <div class="card-bio">${user.bio || '这个人很懒，什么都没写...'}</div>
                        <div class="radar-preview" onclick="showSixDimensions(${user.id}, event)">
                            <div class="radar-preview-header">
                                <span class="radar-preview-title">六维度缘分匹配</span>
                                <span class="radar-preview-score">${user.compatibility_score || 75}分</span>
                            </div>
                            <canvas class="radar-mini-canvas" id="radar-mini-${user.id}" width="300" height="80"></canvas>
                        </div>
                    </div>
                `;
                stack.appendChild(card);
                
                // Draw mini radar
                setTimeout(() => drawMiniRadar(`radar-mini-${user.id}`, user.compatibility_score || 75), 100);
            });
            
            if (currentCards.length === 0) {
                stack.innerHTML = '<div class="loading">暂无更多推荐<br><small>稍后再来看看</small></div>';
            }
        }
        
        // 绘制迷你雷达图
        function drawMiniRadar(canvasId, score) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            
            ctx.clearRect(0, 0, w, h);
            
            // Draw bar chart instead of radar for mini view
            const dims = ['五行', '三觀', '性格', '歲月', '溝通', '目標'];
            const values = [
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10,
                score + Math.random() * 20 - 10
            ];
            
            const barW = (w - 40) / 6;
            const maxH = h - 20;
            
            dims.forEach((dim, i) => {
                const val = Math.max(20, Math.min(100, values[i]));
                const barH = (val / 100) * maxH;
                const x = 20 + i * barW;
                const y = h - 10 - barH;
                
                const gradient = ctx.createLinearGradient(0, y, 0, h - 10);
                gradient.addColorStop(0, 'rgba(255,88,100,0.8)');
                gradient.addColorStop(1, 'rgba(255,88,100,0.2)');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x + 2, y, barW - 6, barH);
                
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '9px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(dim, x + barW / 2, h - 2);
            });
        }
        
        // 显示六维度详情
        async function showSixDimensions(partnerId, event) {
            event.stopPropagation();
            
            const modal = document.getElementById('sixDimModal');
            const content = document.getElementById('sixDimContent');
            modal.classList.add('active');
            
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在分析六维度缘分...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/six-dimensions`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_a_id: currentUserId, user_b_id: partnerId })
                });
                const data = await res.json();
                const analysis = data.analysis;
                
                content.innerHTML = `
                    <div style="text-align:center;margin-bottom:20px;">
                        <div style="font-size:48px;font-weight:800;color:var(--pink);">${analysis.final_score}</div>
                        <div style="font-size:16px;color:var(--text-muted);">${analysis.rating}</div>
                    </div>
                    <div class="radar-container">
                        <canvas class="radar-canvas" id="radar-full" width="400" height="280"></canvas>
                    </div>
                    <div style="margin-top:20px;">
                        ${Object.entries(analysis.dimensions).map(([name, dim]) => {
                            const score = dim.score || dim.overall_score;
                            const color = DIMENSION_COLORS[name] || '#FF5864';
                            return `
                                <div class="dim-score-card">
                                    <div style="min-width:80px;font-size:14px;font-weight:600;">${name}</div>
                                    <div class="dim-score-bar">
                                        <div class="dim-score-fill" style="width:0%;background:${color};" data-width="${score}%"></div>
                                    </div>
                                    <div class="dim-score-value" style="color:${color};">${Math.round(score)}</div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                    <div style="margin-top:20px;padding:16px;background:rgba(0,217,192,0.05);border-radius:14px;border:1px solid rgba(0,217,192,0.15);">
                        <div style="font-size:14px;font-weight:600;color:var(--mint);margin-bottom:8px;">💡 缘分建议</div>
                        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;">${analysis.summary}</div>
                    </div>
                    <div style="margin-top:16px;padding:16px;background:rgba(255,88,100,0.05);border-radius:14px;border:1px solid rgba(255,88,100,0.15);">
                        <div style="font-size:14px;font-weight:600;color:var(--pink);margin-bottom:8px;">🎯 提升建议</div>
                        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;">
                            ${analysis.recommendations?.map(r => `<div style="margin-bottom:6px;">• ${r}</div>`).join('') || '多沟通，多理解，缘分自然来'}
                        </div>
                    </div>
                `;
                
                // Animate bars
                setTimeout(() => {
                    document.querySelectorAll('.dim-score-fill').forEach(bar => {
                        bar.style.width = bar.dataset.width;
                    });
                }, 300);
                
                // Draw full radar
                setTimeout(() => drawFullRadar('radar-full', analysis.radar_chart), 100);
                
            } catch (e) {
                content.innerHTML = '<div class="loading">分析失败，请重试</div>';
            }
        }
        
        // 绘制完整雷达图
        function drawFullRadar(canvasId, radarData) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const w = canvas.width, h = canvas.height;
            const cx = w / 2, cy = h / 2;
            const radius = Math.min(cx, cy) - 40;
            
            ctx.clearRect(0, 0, w, h);
            
            const dims = Object.keys(radarData);
            const values = Object.values(radarData);
            const angleStep = (Math.PI * 2) / dims.length;
            
            // Draw grid
            for (let i = 1; i <= 5; i++) {
                ctx.beginPath();
                ctx.strokeStyle = `rgba(255,255,255,${0.05 + i * 0.02})`;
                ctx.lineWidth = 1;
                for (let j = 0; j < dims.length; j++) {
                    const angle = j * angleStep - Math.PI / 2;
                    const r = (radius / 5) * i;
                    const x = cx + Math.cos(angle) * r;
                    const y = cy + Math.sin(angle) * r;
                    if (j === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // Draw data
            ctx.beginPath();
            values.forEach((val, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = (val / 100) * radius;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });
            ctx.closePath();
            
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            gradient.addColorStop(0, 'rgba(255,88,100,0.3)');
            gradient.addColorStop(1, 'rgba(255,88,100,0.05)');
            ctx.fillStyle = gradient;
            ctx.fill();
            
            ctx.strokeStyle = '#FF5864';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw points
            values.forEach((val, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const r = (val / 100) * radius;
                const x = cx + Math.cos(angle) * r;
                const y = cy + Math.sin(angle) * r;
                
                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#FF5864';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });
            
            // Draw labels
            dims.forEach((dim, i) => {
                const angle = i * angleStep - Math.PI / 2;
                const x = cx + Math.cos(angle) * (radius + 20);
                const y = cy + Math.sin(angle) * (radius + 20);
                
                ctx.fillStyle = '#A0A0B8';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(dim, x, y);
            });
        }
        
        function closeSixDimModal() {
            document.getElementById('sixDimModal').classList.remove('active');
        }
        
        // 滑动操作
        async function swipe(direction) {
            if (currentCardIndex >= currentCards.length) return;
            
            const user = currentCards[currentCardIndex];
            const cards = document.querySelectorAll('.match-card');
            const topCard = cards[0];
            
            const translateX = direction === 'left' ? -400 : direction === 'right' ? 400 : 0;
            const rotate = direction === 'left' ? -25 : direction === 'right' ? 25 : 0;
            topCard.style.transform = `translateX(${translateX}px) rotate(${rotate}deg)`;
            topCard.style.opacity = '0';
            
            try {
                const res = await fetch(`${API_BASE}/swipe`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        swiper_id: currentUserId,
                        swiped_id: user.id,
                        direction: direction === 'super' ? 'super' : direction === 'right' ? 'right' : 'left'
                    })
                });
                const data = await res.json();
                
                if (data.result?.matched) {
                    showMatchModal(data.result, user);
                }
            } catch (e) { console.error('Swipe error:', e); }
            
            setTimeout(() => {
                currentCardIndex++;
                renderCards();
            }, 300);
        }
        
        // 显示匹配弹窗
        function showMatchModal(result, partner) {
            document.getElementById('matchModal').classList.add('active');
            document.getElementById('matchScore').textContent = result.compatibility_score || 88;
            
            // Get current user avatar
            fetch(`${API_BASE}/users/${currentUserId}`)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('matchAvatarA').style.backgroundImage = `url('${data.user?.avatar_url || ''}')`;
                });
            
            document.getElementById('matchAvatarB').style.backgroundImage = `url('${partner.avatar_url}')`;
        }
        
        function closeMatchModal() {
            document.getElementById('matchModal').classList.remove('active');
        }
        
        function goToChat() {
            closeMatchModal();
            showPage('matches');
        }
        
        // 加载匹配列表
        async function loadMatches() {
            const list = document.getElementById('matchList');
            list.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`${API_BASE}/users/${currentUserId}/matches`);
                const data = await res.json();
                
                list.innerHTML = data.matches?.map(m => `
                    <div class="match-item" onclick="openChat(${m.id}, ${m.partner_id})">
                        <div class="match-avatar-small" style="background-image: url('${m.avatar_url}')"></div>
                        <div class="match-info">
                            <div class="match-name">${m.nickname}</div>
                            <div class="match-preview">${m.wuxing_relation === 'mutual' ? '五行相生 ✨' : '缘分天定'}</div>
                        </div>
                        <div class="match-score-badge">${m.compatibility_score}分</div>
                    </div>
                `).join('') || '<div class="loading">暂无匹配</div>';
            } catch (e) {
                list.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 打开聊天
        async function openChat(matchId, partnerId) {
            currentMatchId = matchId;
            currentPartnerId = partnerId;
            showPage('chat');
            
            try {
                const [messagesRes, partnerRes] = await Promise.all([
                    fetch(`${API_BASE}/matches/${matchId}/messages`),
                    fetch(`${API_BASE}/users/${partnerId}`)
                ]);
                
                const messagesData = await messagesRes.json();
                const partnerData = await partnerRes.json();
                currentPartnerData = partnerData.user;
                
                document.getElementById('chatPartnerName').textContent = partnerData.user?.nickname || '未知';
                document.getElementById('chatPartnerAvatar').style.backgroundImage = `url('${partnerData.user?.avatar_url || ''}')`;
                
                const container = document.getElementById('chatMessages');
                container.innerHTML = messagesData.messages?.map(m => `
                    <div class="chat-message ${m.sender_id === currentUserId ? 'own' : ''}">
                        <div class="chat-bubble">${m.content}</div>
                    </div>
                `).join('') || '<div class="loading" style="padding:20px;">开始聊天吧，缘分从这里开始 💕</div>';
                
                container.scrollTop = container.scrollHeight;
                
                // Add insight card
                if (partnerData.user?.fxti_element) {
                    const insight = document.createElement('div');
                    insight.className = 'insight-card';
                    insight.innerHTML = `💕 命理洞察：你们${partnerData.user.fxti_element}命相合，今日宜深入交流`;
                    container.appendChild(insight);
                }
            } catch (e) { console.error('Chat load error:', e); }
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content || !currentMatchId) return;
            
            const container = document.getElementById('chatMessages');
            container.innerHTML += `
                <div class="chat-message own">
                    <div class="chat-bubble">${content}</div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            input.value = '';
            
            try {
                await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        match_id: currentMatchId,
                        sender_id: currentUserId,
                        receiver_id: currentPartnerId || 0,
                        content: content
                    })
                });
                
                // Earn coins for sending message
                await fetch(`${API_BASE}/users/${currentUserId}/coins/earn?action=send_message`, { method: 'POST' });
                loadCoins();
            } catch (e) { console.error('Send error:', e); }
        }
        
        // 加载社区
        async function loadCommunity() {
            const container = document.getElementById('communityPosts');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`${API_BASE}/posts?limit=10`);
                const data = await res.json();
                
                container.innerHTML = data.posts?.map(p => `
                    <div class="post-card">
                        <div class="post-author">
                            <div class="post-avatar" style="background-image: url('${p.author_avatar}')"></div>
                            <div>
                                <div style="font-weight: 600; font-size: 14px;">${p.author_name}</div>
                                <div style="font-size: 11px; color: var(--text-muted);">${new Date(p.created_at).toLocaleDateString()}</div>
                            </div>
                        </div>
                        <div class="post-title">${p.title}</div>
                        <div class="post-content">${p.content.substring(0, 100)}...</div>
                        <div class="post-tags">
                            ${p.tags?.map(t => `<span class="post-tag">${t}</span>`).join('') || ''}
                        </div>
                        <div class="post-stats">
                            <span>👁 ${p.view_count}</span>
                            <span>❤️ ${p.like_count}</span>
                            <span>💬 ${p.comment_count}</span>
                        </div>
                    </div>
                `).join('') || '<div class="loading">暂无帖子</div>';
            } catch (e) {
                container.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 加载专家
        async function loadExperts() {
            const container = document.getElementById('expertList');
            container.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const res = await fetch(`${API_BASE}/experts`);
                const data = await res.json();
                
                container.innerHTML = data.experts?.map(e => `
                    <div class="expert-card">
                        <div class="expert-header">
                            <div class="expert-avatar" style="background-image: url('${e.avatar_url}')"></div>
                            <div class="expert-info">
                                <div class="expert-name">${e.real_name || e.nickname}</div>
                                <div class="expert-title">${e.title}</div>
                                <div class="expert-rating">⭐ ${e.rating} (${e.review_count}评价)</div>
                            </div>
                        </div>
                        <div class="expert-tags">
                            ${e.specialties?.map(s => `<span class="expert-tag">${s}</span>`).join('') || ''}
                        </div>
                        <div style="font-size: 13px; color: var(--text-muted); margin: 8px 0;">${e.bio?.substring(0, 80)}...</div>
                        <div class="expert-price">$${e.consultation_price} HKD/次</div>
                        <button class="expert-book-btn" onclick="bookExpert(${e.id})">立即预约</button>
                    </div>
                `).join('') || '<div class="loading">暂无专家</div>';
            } catch (e) {
                container.innerHTML = '<div class="loading">加载失败</div>';
            }
        }
        
        // 加载每日一卦
        async function loadFortune() {
            const card = document.getElementById('fortuneCard');
            card.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在计算今日运势...</p></div>';
            
            try {
                const res = await fetch(`${API_BASE}/daily-fortune`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: currentUserId })
                });
                const data = await res.json();
                const f = data.fortune;
                
                card.innerHTML = `
                    <div class="fortune-gua">${['☰','☷','☳','☴','☵','☲','☶','☱'][f.gua_number - 1] || '☯'}</div>
                    <div class="fortune-name">${f.gua_name}卦 · ${f.gua_type}</div>
                    <div class="fortune-score">${f.overall_score}</div>
                    <div style="color: var(--text-muted); font-size: 14px;">今日综合运势</div>
                    <div class="fortune-grid">
                        <div class="fortune-item">
                            <div class="fortune-item-label">💕 爱情</div>
                            <div class="fortune-item-value">${f.love_score}</div>
                        </div>
                        <div class="fortune-item">
                            <div class="fortune-item-label">💼 事业</div>
                            <div class="fortune-item-value">${f.career_score}</div>
                        </div>
                        <div class="fortune-item">
                            <div class="fortune-item-label">💰 财运</div>
                            <div class="fortune-item-value">${f.wealth_score}</div>
                        </div>
                        <div class="fortune-item">
                            <div class="fortune-item-label">🏃 健康</div>
                            <div class="fortune-item-value">${f.health_score}</div>
                        </div>
                    </div>
                    <div style="margin-top: 20px; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 14px; position:relative;z-index:1;">
                        <div style="font-size: 13px; color: var(--pink); margin-bottom: 6px; font-weight:600;">💡 今日建议</div>
                        <div style="font-size: 13px; color: var(--text-muted); line-height:1.6;">${f.advice}</div>
                    </div>
                    <div style="margin-top: 12px; font-size: 12px; color: var(--text-muted); position:relative;z-index:1;">
                        🎨 幸运色: ${f.lucky_color} | 🧭 幸运方向: ${f.lucky_direction}
                    </div>
                `;
                
                // Earn coins for daily fortune
                await fetch(`${API_BASE}/users/${currentUserId}/coins/earn?action=daily_fortune`, { method: 'POST' });
                loadCoins();
            } catch (e) {
                card.innerHTML = '<div class="loading">运势计算失败</div>';
            }
        }
        
        function bookExpert(expertId) {
            alert('预约功能开发中，请稍后...');
        }
        
        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') swipe('left');
            if (e.key === 'ArrowRight') swipe('right');
            if (e.key === 'Enter' && document.getElementById('chatInput') === document.activeElement) {
                sendMessage();
            }
        });
        
        // 触摸滑动支持
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        document.addEventListener('touchend', (e) => {
            const diffX = e.changedTouches[0].clientX - touchStartX;
            const diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 80) {
                swipe(diffX > 0 ? 'right' : 'left');
            }
        }, { passive: true });
        
        // 初始化
        loadDiscover();
        loadCoins();
    </script>
</body>
</html>
