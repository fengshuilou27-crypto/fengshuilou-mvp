<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FXTI 分享卡</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .share-card {
            width: 480px;
            height: 720px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            border-radius: 24px;
            padding: 48px 40px;
            box-sizing: border-box;
            color: #fff;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .share-card::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -30%;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle, rgba(102,126,234,0.15) 0%, transparent 60%);
        }
        .card-logo {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            letter-spacing: 2px;
            margin-bottom: 36px;
            text-transform: uppercase;
        }
        .card-type {
            font-size: 52px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff 0%, #a8b2d1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }
        .card-title {
            font-size: 22px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 32px;
            font-weight: 500;
        }
        .element-bars {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        .element-bar {
            text-align: center;
        }
        .element-bar-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 6px;
        }
        .element-bar-track {
            width: 32px;
            height: 80px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .element-bar-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            border-radius: 0 0 16px 16px;
            transition: height 1s ease;
        }
        .element-bar-value {
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            margin-top: 6px;
            font-weight: 600;
        }
        .card-traits {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 28px;
        }
        .card-trait {
            background: rgba(255,255,255,0.12);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: rgba(255,255,255,0.85);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .card-quote {
            font-size: 15px;
            line-height: 1.7;
            text-align: center;
            color: rgba(255,255,255,0.65);
            margin-bottom: 36px;
            padding: 0 12px;
        }
        .card-footer {
            position: absolute;
            bottom: 40px;
            left: 40px;
            right: 40px;
            text-align: center;
        }
        .card-url {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
        .download-btn {
            display: block;
            width: 200px;
            margin: 24px auto 0;
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .download-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="shareCard" class="share-card">
        <div class="card-logo">FXTI 五行人格測評</div>
        <div class="card-type" id="cardType">...</div>
        <div class="card-title" id="cardTitle">...</div>
        <div class="element-bars" id="elementBars"></div>
        <div class="card-traits" id="cardTraits"></div>
        <div class="card-quote" id="cardQuote">...</div>
        <div class="card-footer">
            <div class="card-url">掃描測試你的五行人格 · fxti.fengshui</div>
        </div>
    </div>

    <button id="downloadBtn" class="download-btn">下載分享卡</button>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script>
        const resultData = JSON.parse(localStorage.getItem('fxti_result') || '{}');
        const WUXING_COLORS = {
            '金': '#C0C0C0',
            '木': '#32CD32',
            '水': '#00BFFF',
            '火': '#FF6347',
            '土': '#FFD700'
        };
        
        if (resultData.profile) {
            document.getElementById('cardType').textContent = resultData.profile.name;
            document.getElementById('cardTitle').textContent = resultData.profile.title;
            document.getElementById('cardQuote').textContent = resultData.profile.description;
            
            // 五行柱狀圖
            const barsContainer = document.getElementById('elementBars');
            const wuxing = resultData.final_wuxing || {};
            ['金', '木', '水', '火', '土'].forEach(el => {
                const pct = wuxing[el] || 0;
                const bar = document.createElement('div');
                bar.className = 'element-bar';
                bar.innerHTML = `
                    <div class="element-bar-label">${el}</div>
                    <div class="element-bar-track">
                        <div class="element-bar-fill" style="height: ${pct}%; background: ${WUXING_COLORS[el]}"></div>
                    </div>
                    <div class="element-bar-value">${pct}%</div>
                `;
                barsContainer.appendChild(bar);
            });
            
            // 特質標籤（取前3個）
            const traitsContainer = document.getElementById('cardTraits');
            const traits = resultData.profile.traits || ['獨特', '平衡', '多面'];
            traits.slice(0, 3).forEach(trait => {
                const span = document.createElement('span');
                span.className = 'card-trait';
                span.textContent = trait;
                traitsContainer.appendChild(span);
            });
        }
        
        document.getElementById('downloadBtn').addEventListener('click', function() {
            const card = document.getElementById('shareCard');
            html2canvas(card, { scale: 2, backgroundColor: null }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'fxti-五行人格.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        });
    </script>
</body>
</html>
