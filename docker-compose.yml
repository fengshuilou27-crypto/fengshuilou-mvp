version: '3.8'

services:
  fengshuilou:
    build: .
    container_name: fengshuilou_api
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./data:/app/data:ro
    networks:
      - fengshuilou_network

  nginx:
    image: nginx:alpine
    container_name: fengshuilou_nginx
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - fengshuilou
    networks:
      - fengshuilou_network

networks:
  fengshuilou_network:
    driver: bridge
